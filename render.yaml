services:
  # ── 1. FastAPI Web Backend ──────────────────────────────────────
  - type: web
    name: ai-news-curator-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uv run uvicorn app.api.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false

  # ── 2. React SPA Frontend (Static Site) ─────────────────────────
  - type: web
    name: ai-news-curator-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
